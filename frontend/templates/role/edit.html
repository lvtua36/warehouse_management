{% extends "layouts/base.html" %}

{% block title %}
Sửa Role
{% endblock %}

{% block content %}

<h2>Sửa Role</h2>

<form method="POST">

    <input
        type="text"
        name="name"
        value="{{ role.name }}"
        required>

    <br><br>

    <textarea
        name="description">{{ role.description }}</textarea>

    <br><br>

    <button>

        Cập nhật

    </button>

</form>

{% endblock %}
