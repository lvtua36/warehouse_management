{% extends "layouts/base.html" %}

{% block title %}
Edit Permission
{% endblock %}

{% block content %}

<h2>Edit Permission</h2>

<form method="POST">

    <p>

        <label>Code</label>

        <br>

        <input
            type="text"
            name="code"
            value="{{ permission.code }}"
            required>

    </p>

    <p>

        <label>Name</label>

        <br>

        <input
            type="text"
            name="name"
            value="{{ permission.name }}"
            required>

    </p>

    <p>

        <label>Module</label>

        <br>

        <input
            type="text"
            name="module"
            value="{{ permission.module }}"
            required>

    </p>

    <p>

        <label>Description</label>

        <br>

        <textarea
            name="description">{{ permission.description }}</textarea>

    </p>

    <button type="submit">
        Update
    </button>

    <a href="/permissions">
        Cancel
    </a>

</form>

{% endblock %}
